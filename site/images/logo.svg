<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Outer flame gradient -->
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c8a25c"/>
      <stop offset="50%" stop-color="#dfc088"/>
      <stop offset="100%" stop-color="#faf6f0"/>
    </linearGradient>
    <!-- Inner flame gradient -->
    <linearGradient id="innerFlame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6b2737"/>
      <stop offset="55%" stop-color="#c8a25c"/>
      <stop offset="100%" stop-color="#faf6f0"/>
    </linearGradient>
    <!-- Ring gradient -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c8a25c"/>
      <stop offset="50%" stop-color="#dfc088"/>
      <stop offset="100%" stop-color="#c8a25c"/>
    </linearGradient>
    <!-- Background glow -->
    <radialGradient id="glow" cx="50%" cy="52%" r="42%">
      <stop offset="0%" stop-color="#c8a25c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8a25c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle glow -->
  <circle cx="60" cy="62" r="50" fill="url(#glow)"/>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.7"/>

  <!-- Cardinal direction diamonds -->
  <!-- North -->
  <polygon points="60,4 62.5,8 60,12 57.5,8" fill="#c8a25c" opacity="0.8"/>
  <!-- South -->
  <polygon points="60,108 62.5,112 60,116 57.5,112" fill="#c8a25c" opacity="0.8"/>
  <!-- East -->
  <polygon points="108,60 112,62.5 116,60 112,57.5" fill="#c8a25c" opacity="0.8"/>
  <!-- West -->
  <polygon points="4,60 8,62.5 12,60 8,57.5" fill="#c8a25c" opacity="0.8"/>

  <!-- Outer flame shape -->
  <path d="M60,22
           C68,40 82,52 84,66
           C86,82 76,96 60,102
           C44,96 34,82 36,66
           C38,52 52,40 60,22Z"
        fill="url(#flame)" opacity="0.9"/>

  <!-- Inner flame shape -->
  <path d="M60,38
           C65,50 75,58 76,68
           C77,78 71,88 60,92
           C49,88 43,78 44,68
           C45,58 55,50 60,38Z"
        fill="url(#innerFlame)" opacity="0.95"/>

  <!-- Bright center -->
  <ellipse cx="60" cy="70" rx="6" ry="8" fill="#faf6f0" opacity="0.7"/>
  <ellipse cx="60" cy="72" rx="3" ry="4.5" fill="#ffffff" opacity="0.9"/>
</svg>